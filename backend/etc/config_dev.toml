[redisconf]
Host = '127.0.0.1:6379'
# Host = 'redis-server:6379' # docker连接配置
Db = 0

[Prometheus]
Host = '0.0.0.0'
Port = 4001
Path = '/metrics'

[log]
ServiceName = 'coreRpcLogger'
Mode = 'console'                  # file 是生产环境的配置，console 是开发环境的配置
Path = '/home/data/logs/core/rpc'
Encoding = 'plain'                # plain 是开发环境的配置，json 是生产环境的配置
Level = 'info'                    # info debug warn error fatal panic
Compress = false
KeepDays = 7
StackCoolDownMillis = 100


## TODO 请修改为自己的支付回调地址
[PayProperties]
OrderNotifyUrl = ''
RefundNotifyUrl = ''
OrderNoPrefix = 'P'
RefundNoPrefix = 'R'

